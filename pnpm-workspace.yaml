allowBuilds:
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - astro@7.1.3

# sharp powers Astro's build-time image optimization (astro:assets);
# esbuild is Vite's bundler used by Astro.
onlyBuiltDependencies:
  - sharp
  - esbuild

# Keep postcss on a patched release for CVE-2026-41305 (pulled transitively).
overrides:
  postcss: ">=8.5.10"
